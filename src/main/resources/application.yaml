server:
  port: 8081
  servlet:
    context-path: /closedcart/api

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: products-server
  boot:
    admin:
      client:
        url: http://localhost:8082
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://localhost:5432/MotoCartEnterprise
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true

cloudinay:
  cloud-name: Root
  key: 812647687394779
  secret: Q9qvnlhgkmDAhTq-q7Mn6sszD7g
  url: CLOUDINARY_URL=cloudinary://<your_api_key>:<your_api_secret>@dasm0cbyx
logging:
  level:
    root: INFO